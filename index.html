  .progress-fill { height: 100%; background: var(--progress-fill); border-radius: 99px; transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

  .day-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }

  .day-date { font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }

  2: { label: "Étape 2 — Le marché", color: "var(--etape2)" },
  3: { label: "Étape 3 — Marketing et communication", color: "var(--etape3)" },
  4: { label: "Étape 4 — Opération", color: "var(--etape4)" },
  5: { label: "Étape 5 — Finances", color: "var(--etape5)" },
};

const MONTHS_FR = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];

function formatDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${d.getDate()} ${MONTHS_FR[d.getMonth()]}`;
}

function getToday() { return new Date().toISOString().split('T')[0]; }

function buildSchedule() {
  const container = document.getElementById('scheduleContainer');
  const today = getToday();
  const weeks = {};
  DATA.forEach(item => {
    if (!weeks[item.week]) weeks[item.week] = { etape: item.etape, items: [] };
    weeks[item.week].items.push(item);
    if (item.etape > weeks[item.week].etape) weeks[item.week].etape = item.etape;
  });
  let lastEtape = 0, html = '';
  const weekNums = Object.keys(weeks).map(Number).sort((a, b) => a - b);
  weekNums.forEach((wNum, idx) => {
    const w = weeks[wNum];
    const classItems = w.items.filter(i => i.title);
    if (!classItems.length) return;
    const firstEtape = w.items[0].etape;
    if (firstEtape !== lastEtape) {
      const e = ETAPES[firstEtape];
      html += `<div class="etape-divider"><span class="etape-dot" style="background:${e.color}"></span><span style="color:${e.color}">${e.label}</span></div>`;
      lastEtape = firstEtape;
    }
    const dates = classItems.map(i => formatDate(i.date));
    const dateRange = dates.length === 1 ? dates[0] : dates[0] + ' — ' + dates[dates.length - 1];
    const hasToday = w.items.some(i => i.date === today);
    html += `<div class="week${hasToday ? ' open' : ''}" data-week="${wNum}" style="animation-delay:${idx * 0.03}s">`;
    html += `<div class="week-header" onclick="toggleWeek(this)"><div class="week-header-left">`;
    html += `<svg class="week-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
    html += `<span class="week-title">Semaine ${wNum}</span></div>`;
    html += `<span class="week-dates">${dateRange}</span></div>`;
    html += `<div class="week-body"><div class="week-content">`;
    w.items.forEach(item => {
      if (!item.title) return;
      const isToday = item.date === today;
      const hours = item.day === 'samedi' ? '8h30 – 15h30' : '18h – 21h';
      let cls = 'day-row';
      if (isToday) cls += ' today';
      html += `<div class="${cls}" data-title="${item.title.toLowerCase()}" data-date="${item.date}">`;
      html += `<span class="day-date">${formatDate(item.date)}</span>`;
      html += `<span class="day-name">${item.day}</span>`;
      html += `<span class="day-hours">${hours}</span>`;
      html += `<span class="day-title">${item.title}</span></div>`;
    });
    html += `</div></div></div>`;
  });
  container.innerHTML = html;
  document.querySelectorAll('.week').forEach(week => {
    const dates = [...week.querySelectorAll('.day-row')].map(r => r.getAttribute('data-date'));
    const lastDate = dates[dates.length - 1];
    if (lastDate && lastDate < today) week.classList.add('past-week');
  });
  updateProgress(today);
}

function toggleWeek(h) { h.parentElement.classList.toggle('open'); }

function updateProgress(today) {
  const all = DATA.filter(d => d.title);
  const done = all.filter(d => d.date < today);
  const pct = all.length ? Math.round((done.length / all.length) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('completedCount').textContent = done.length;
  document.getElementById('remainingCount').textContent = all.length - done.length;
  document.getElementById('totalCount').textContent = all.length;
}

let showingPast = false;
function togglePastWeeks() {
  showingPast = !showingPast;
  document.querySelectorAll('.week.past-week').forEach(w => w.classList.toggle('show-past', showingPast));
  document.getElementById('togglePast').querySelector('span').textContent = showingPast ? 'Masquer les semaines passées' : 'Afficher les semaines passées';
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let anyVisible = false;
  document.querySelectorAll('.week').forEach(week => {
    const rows = week.querySelectorAll('.day-row');
    let match = false;
    rows.forEach(row => {
      const t = row.getAttribute('data-title'), d = row.getAttribute('data-date');
      if (!q || t.includes(q) || d.includes(q)) { row.classList.remove('hidden-by-search'); match = true; }
      else row.classList.add('hidden-by-search');
    });
    if (match || !q) { week.classList.remove('hidden-by-search'); if (q) week.classList.add('open'); anyVisible = true; }
    else week.classList.add('hidden-by-search');
  });
  document.getElementById('noResults').classList.toggle('visible', !anyVisible);
});

buildSchedule();
</script>
</body>
</html>
